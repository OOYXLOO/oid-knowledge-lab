<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 320" role="img" aria-labelledby="title desc">
  <title id="title">Qwen Architecture Diagram</title>
  <desc id="desc">Sanitized OID inventory flows through deterministic checks, Qwen Cloud reasoning, a policy guard, a human approval gate, and generated handoff artifacts.</desc>
  <style>
    .bg{fill:#f8fafc}
    .title{font:700 24px Arial,sans-serif;fill:#111827}
    .subtitle{font:400 14px Arial,sans-serif;fill:#4b5563}
    .card{fill:#ffffff;stroke:#1f2937;stroke-width:1.5}
    .qwen{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}
    .gate{fill:#ecfdf5;stroke:#047857;stroke-width:2}
    .label{font:600 14px Arial,sans-serif;fill:#111827;text-anchor:middle}
    .step{font:700 12px Arial,sans-serif;fill:#6b7280}
    .edge{stroke:#6b7280;stroke-width:2;fill:none}
    .arrow{fill:#6b7280}
    .note{font:400 13px Arial,sans-serif;fill:#374151}
  </style>
  <rect width="1560" height="320" class="bg"/>
  <text x="40" y="44" class="title">Qwen Cloud Autopilot Agent Architecture</text>
  <text x="40" y="68" class="subtitle">Deterministic OID evidence first; Qwen explains and drafts; humans approve before external action.</text>
  <g>
    <path d="M 210 132 L 232 132" class="edge"/><path d="M 232 125 L 250 132 L 232 139" class="arrow"/>
    <path d="M 440 132 L 462 132" class="edge"/><path d="M 462 125 L 480 132 L 462 139" class="arrow"/>
    <path d="M 650 132 L 672 132" class="edge"/><path d="M 672 125 L 690 132 L 672 139" class="arrow"/>
    <path d="M 880 132 L 902 132" class="edge"/><path d="M 902 125 L 920 132 L 902 139" class="arrow"/>
    <path d="M 1070 132 L 1092 132" class="edge"/><path d="M 1092 125 L 1110 132 L 1092 139" class="arrow"/>
    <path d="M 1280 132 L 1302 132" class="edge"/><path d="M 1302 125 L 1320 132 L 1302 139" class="arrow"/>
    <g>
      <rect x="40" y="96" width="170" height="72" rx="10" class="card"/>
      <text x="125" y="132" class="label"><tspan x="125" dy="0">Sanitized OID inventory</tspan></text>
      <text x="54" y="118" class="step">1</text>
    </g>
    <g>
      <rect x="250" y="96" width="190" height="72" rx="10" class="card"/>
      <text x="345" y="124" class="label"><tspan x="345" dy="0">Deterministic parser</tspan><tspan x="345" dy="18">validators</tspan></text>
      <text x="264" y="118" class="step">2</text>
    </g>
    <g>
      <rect x="480" y="96" width="170" height="72" rx="10" class="card"/>
      <text x="565" y="132" class="label"><tspan x="565" dy="0">Public registry lookup</tspan></text>
      <text x="494" y="118" class="step">3</text>
    </g>
    <g>
      <rect x="690" y="88" width="190" height="88" rx="10" class="card qwen"/>
      <text x="785" y="132" class="label"><tspan x="785" dy="0">Qwen Cloud reasoning step</tspan></text>
      <text x="704" y="110" class="step">4</text>
    </g>
    <g>
      <rect x="920" y="96" width="150" height="72" rx="10" class="card"/>
      <text x="995" y="132" class="label"><tspan x="995" dy="0">Policy guard</tspan></text>
      <text x="934" y="118" class="step">5</text>
    </g>
    <g>
      <rect x="1110" y="88" width="170" height="88" rx="10" class="card gate"/>
      <text x="1195" y="132" class="label"><tspan x="1195" dy="0">Human approval gate</tspan></text>
      <text x="1124" y="110" class="step">6</text>
    </g>
    <g>
      <rect x="1320" y="96" width="190" height="72" rx="10" class="card"/>
      <text x="1415" y="124" class="label"><tspan x="1415" dy="0">Markdown</tspan><tspan x="1415" dy="18">CSV</tspan></text>
      <text x="1334" y="118" class="step">7</text>
    </g>
  </g>
  <text x="40" y="268" class="note">Public boundary: no secrets, customer exports, copied OID-base page bodies, payment data, identity documents, cookies, or OTPs.</text>
</svg>
