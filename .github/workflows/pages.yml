name: Verify static dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - public/**
      - .github/workflows/pages.yml

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify static dashboard
        shell: bash
        run: |
          test -f public/index.html
          test -f public/search-index.js
          test -f public/oid-base-directory.js
          test -f public/sample-assessment.html
          grep -q "OID inventory assessment handoff" public/index.html
          grep -q "How to use this sample with a real inventory" public/sample-assessment.html
          test -f public/writing-samples.html
          grep -q "Developer documentation, observability, and release-safety samples" public/writing-samples.html
          grep -q "editor-pitch-pack.html" public/writing-samples.html
          test -f public/editor-pitch-pack.html
          grep -q "Field-ready editor pitch pack" public/editor-pitch-pack.html
          test -f public/enterprise-market-brief.html
          grep -q "OID enterprise market brief" public/enterprise-market-brief.html
