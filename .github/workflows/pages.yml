name: Deploy static dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - public/**
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: static-dashboard-deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify static dashboard
        shell: bash
        run: |
          test -f public/index.html
          test -f public/search-index.js
          test -f public/oid-base-directory.js
          test -f public/sample-assessment.html
          grep -q "OID inventory assessment handoff" public/index.html
          grep -q "How to use this sample with a real inventory" public/sample-assessment.html
          test -f public/writing-samples.html
          grep -q "Developer documentation, observability, and release-safety samples" public/writing-samples.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
